<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <linearGradient id="rt_shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A6FF"/>
      <stop offset="50%" stop-color="#8847FF"/>
      <stop offset="100%" stop-color="#4A1F8F"/>
    </linearGradient>
    <linearGradient id="rt_field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2342"/>
      <stop offset="100%" stop-color="#15102A"/>
    </linearGradient>
    <radialGradient id="rt_halo" cx="50%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#A974FF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#A974FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="rt_glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="80" cy="146" rx="32" ry="6.5" fill="#000" opacity="0.4"/>
  <circle cx="80" cy="72" r="56" fill="url(#rt_halo)"/>
  <g filter="url(#rt_glow)">
    <path d="M80 18 L124 32 V78 C124 110 104 130 80 142 C56 130 36 110 36 78 V32 Z"
          fill="url(#rt_field)" stroke="url(#rt_shield)" stroke-width="5" stroke-linejoin="round"/>
    <!-- Rotterdam: vertical green band w/ silver-violet stripes (stylized) -->
    <rect x="70" y="30" width="20" height="100" fill="url(#rt_shield)" opacity="0.92"/>
    <!-- lion / tower mark -->
    <path d="M80 52 l8 8 v22 h-16 v-22 z" fill="#E7D2FF" opacity="0.9"/>
    <rect x="74" y="60" width="12" height="4" fill="#4A1F8F"/>
    <path d="M80 18 L124 32 V44 C100 34 80 30 80 30 Z" fill="#FFFFFF" opacity="0.16"/>
  </g>
</svg>
