<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <linearGradient id="am_shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8FA8FF"/>
      <stop offset="50%" stop-color="#4B69FF"/>
      <stop offset="100%" stop-color="#23348F"/>
    </linearGradient>
    <linearGradient id="am_field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E2440"/>
      <stop offset="100%" stop-color="#10162C"/>
    </linearGradient>
    <radialGradient id="am_halo" cx="50%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#6E8BFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6E8BFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="am_glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="80" cy="146" rx="32" ry="6.5" fill="#000" opacity="0.4"/>
  <circle cx="80" cy="72" r="56" fill="url(#am_halo)"/>
  <g filter="url(#am_glow)">
    <path d="M80 18 L124 32 V78 C124 110 104 130 80 142 C56 130 36 110 36 78 V32 Z"
          fill="url(#am_field)" stroke="url(#am_shield)" stroke-width="5" stroke-linejoin="round"/>
    <!-- Amsterdam: three St Andrew's crosses (XXX) on a pale -->
    <rect x="68" y="30" width="24" height="100" fill="#0B1020" opacity="0.7"/>
    <g fill="#E2E8FF">
      <g transform="translate(80 50)"><path d="M-6,-6 L6,6 M6,-6 L-6,6" stroke="#E2E8FF" stroke-width="4" stroke-linecap="round"/></g>
      <g transform="translate(80 80)"><path d="M-6,-6 L6,6 M6,-6 L-6,6" stroke="#E2E8FF" stroke-width="4" stroke-linecap="round"/></g>
      <g transform="translate(80 110)"><path d="M-6,-6 L6,6 M6,-6 L-6,6" stroke="#E2E8FF" stroke-width="4" stroke-linecap="round"/></g>
    </g>
    <path d="M80 18 L124 32 V44 C100 34 80 30 80 30 Z" fill="#FFFFFF" opacity="0.16"/>
  </g>
</svg>
